<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cars</title>
</head>
<body>
<h1> Table of cars </h1>
<table>

    <tr>
        <th>Model</th>
        <th>Year</th>
        <th>Color</th>
    </tr>
    <tr th:each="cars : ${carsL}">
        <td th:utext="${cars.getModel()}"></td>
        <td th:utext="${cars.getYear()}"></td>
        <td th:utext="${cars.getColor()}"></td>
    </tr>
</table>
</body>
</html>
